<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Генератор идей для постов</title>
    <style>
      :root {
        --bg-1: #0f172a;
        --bg-2: #1e293b;
        --card: rgba(15, 23, 42, 0.75);
        --text: #e2e8f0;
        --accent: #38bdf8;
        --accent-2: #a78bfa;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top left, #334155 0%, transparent 45%),
          linear-gradient(135deg, var(--bg-1), var(--bg-2));
      }

      .card {
        width: min(680px, 100%);
        background: var(--card);
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 20px;
        backdrop-filter: blur(8px);
        padding: 30px 28px;
        box-shadow: 0 20px 45px rgba(2, 6, 23, 0.45);
        animation: fadeUp 0.8s ease-out both;
      }

      h1 {
        margin: 0 0 18px;
        font-size: clamp(1.5rem, 2vw + 1rem, 2.2rem);
        line-height: 1.2;
        letter-spacing: 0.3px;
      }

      ul {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 12px;
      }

      li {
        position: relative;
        background: rgba(30, 41, 59, 0.8);
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 14px;
        padding: 14px 16px 14px 44px;
        font-size: 1.05rem;
        transform: translateX(-8px);
        opacity: 0;
        animation: listIn 0.6s ease forwards;
        transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
      }

      li::before {
        content: "";
        position: absolute;
        left: 16px;
        top: 50%;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        transform: translateY(-50%);
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
      }

      li:nth-child(1) {
        animation-delay: 0.2s;
      }
      li:nth-child(2) {
        animation-delay: 0.35s;
      }
      li:nth-child(3) {
        animation-delay: 0.5s;
      }

      li:hover {
        transform: translateX(0) translateY(-2px);
        border-color: rgba(56, 189, 248, 0.65);
        box-shadow: 0 8px 20px rgba(14, 165, 233, 0.2);
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes listIn {
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Генератор идей для постов</h1>
      <ul>
        <li>5 идей постов для экспертов</li>
        <li>3 идеи сторис на сегодня</li>
        <li>контент план на неделю</li>
      </ul>
    </main>
  </body>
</html>
