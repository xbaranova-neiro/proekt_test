<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Генератор идей для постов</title>
    <style>
      :root {
        --bg-1: #0f172a;
        --bg-2: #1e293b;
        --card: rgba(15, 23, 42, 0.75);
        --text: #e2e8f0;
        --accent: #38bdf8;
        --accent-2: #a78bfa;
        --border: rgba(148, 163, 184, 0.25);
        --item-bg: rgba(30, 41, 59, 0.8);
        --item-border: rgba(148, 163, 184, 0.2);
      }

      :root[data-theme="light"] {
        --bg-1: #e2e8f0;
        --bg-2: #cbd5e1;
        --card: rgba(255, 255, 255, 0.9);
        --text: #0f172a;
        --accent: #0284c7;
        --accent-2: #7c3aed;
        --border: rgba(100, 116, 139, 0.25);
        --item-bg: rgba(248, 250, 252, 0.9);
        --item-border: rgba(100, 116, 139, 0.2);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top left, rgba(51, 65, 85, 0.75) 0%, transparent 45%),
          linear-gradient(135deg, var(--bg-1), var(--bg-2));
        transition: background 0.35s ease, color 0.35s ease;
      }

      .card {
        width: min(680px, 100%);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        backdrop-filter: blur(8px);
        padding: 30px 28px;
        box-shadow: 0 20px 45px rgba(2, 6, 23, 0.45);
        animation: fadeUp 0.8s ease-out both;
        transition: background 0.35s ease, border-color 0.35s ease;
      }

      h1 {
        margin: 0 0 18px;
        font-size: clamp(1.5rem, 2vw + 1rem, 2.2rem);
        line-height: 1.2;
        letter-spacing: 0.3px;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 18px;
      }

      .theme-toggle {
        border: 1px solid var(--border);
        color: var(--text);
        background: transparent;
        border-radius: 999px;
        padding: 8px 14px;
        font-size: 0.9rem;
        cursor: pointer;
        transition: transform 0.2s ease, background-color 0.25s ease, border-color 0.25s ease;
      }

      .theme-toggle:hover {
        transform: translateY(-1px);
        border-color: rgba(56, 189, 248, 0.65);
        background: rgba(56, 189, 248, 0.1);
      }

      ul {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 12px;
      }

      li {
        position: relative;
        background: var(--item-bg);
        border: 1px solid var(--item-border);
        border-radius: 14px;
        padding: 14px 16px 14px 44px;
        font-size: 1.05rem;
        transform: translateX(-8px);
        opacity: 0;
        animation: listIn 0.6s ease forwards;
        transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease,
          background 0.3s ease;
      }

      li::before {
        content: "";
        position: absolute;
        left: 16px;
        top: 50%;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        transform: translateY(-50%);
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
      }

      li:nth-child(1) {
        animation-delay: 0.2s;
      }
      li:nth-child(2) {
        animation-delay: 0.35s;
      }
      li:nth-child(3) {
        animation-delay: 0.5s;
      }

      li:hover {
        transform: translateX(0) translateY(-2px);
        border-color: rgba(56, 189, 248, 0.65);
        box-shadow: 0 8px 20px rgba(14, 165, 233, 0.2);
      }

      .actions {
        margin-top: 18px;
        display: flex;
        justify-content: flex-end;
      }

      .generate-btn {
        border: none;
        border-radius: 12px;
        padding: 12px 16px;
        color: #f8fafc;
        font-weight: 600;
        cursor: pointer;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        box-shadow: 0 10px 22px rgba(56, 189, 248, 0.35);
        transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
      }

      .generate-btn:hover {
        transform: translateY(-2px) scale(1.02);
        box-shadow: 0 14px 28px rgba(56, 189, 248, 0.38);
      }

      .generate-btn:active {
        transform: translateY(0) scale(0.99);
      }

      .generate-btn.is-generating {
        animation: pulse 0.9s ease-in-out infinite;
        pointer-events: none;
      }

      @media (max-width: 640px) {
        body {
          padding: 0;
          place-items: stretch;
        }

        .card {
          width: 100%;
          min-height: 100vh;
          border-radius: 0;
          padding: 22px 18px 26px;
          display: flex;
          flex-direction: column;
          justify-content: flex-start;
        }

        h1 {
          font-size: 1.55rem;
        }

        .toolbar {
          margin-bottom: 14px;
        }

        .theme-toggle {
          padding: 9px 13px;
        }

        li {
          font-size: 1rem;
          border-radius: 12px;
          padding: 13px 14px 13px 40px;
        }

        .actions {
          margin-top: auto;
          padding-top: 18px;
        }

        .generate-btn {
          width: 100%;
          padding: 14px 16px;
          border-radius: 14px;
          font-size: 1rem;
        }
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes listIn {
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          filter: brightness(1);
        }
        50% {
          transform: scale(1.02);
          filter: brightness(1.08);
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="toolbar">
        <h1>Генератор идей для постов</h1>
        <button class="theme-toggle" id="themeToggle" type="button">Светлая тема</button>
      </div>
      <ul>
        <li>5 идей постов для экспертов</li>
        <li>3 идеи сторис на сегодня</li>
        <li>контент план на неделю</li>
      </ul>
      <div class="actions">
        <button class="generate-btn" id="generateBtn" type="button">Сгенерировать идеи</button>
      </div>
    </main>
    <script>
      const root = document.documentElement;
      const themeToggle = document.getElementById("themeToggle");
      const generateBtn = document.getElementById("generateBtn");
      const list = document.querySelector("ul");

      const updateThemeButtonText = () => {
        const isLight = root.getAttribute("data-theme") === "light";
        themeToggle.textContent = isLight ? "Темная тема" : "Светлая тема";
      };

      themeToggle.addEventListener("click", () => {
        const isLight = root.getAttribute("data-theme") === "light";
        if (isLight) {
          root.removeAttribute("data-theme");
        } else {
          root.setAttribute("data-theme", "light");
        }
        updateThemeButtonText();
      });

      const ideasPool = [
        "Разбор 3 ошибок, которые тормозят рост эксперта",
        "Мини-кейс: как одна стратегия дала результат за 7 дней",
        "Чеклист для сильного экспертного поста",
        "5 быстрых сторис для прогрева аудитории",
        "План контента на неделю: польза, кейс, вовлечение",
        "Один миф в вашей нише и как его разрушить",
      ];

      generateBtn.addEventListener("click", () => {
        generateBtn.classList.add("is-generating");
        generateBtn.textContent = "Генерируем...";

        setTimeout(() => {
          const shuffled = [...ideasPool].sort(() => Math.random() - 0.5).slice(0, 3);
          list.innerHTML = shuffled.map((idea) => "<li>" + idea + "</li>").join("");
          generateBtn.classList.remove("is-generating");
          generateBtn.textContent = "Сгенерировать идеи";
        }, 850);
      });

      updateThemeButtonText();
    </script>
  </body>
</html>
